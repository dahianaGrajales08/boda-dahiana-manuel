<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda Dahiana & Manuel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <audio id="music">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="envelope-wrapper" id="envelope-wrapper">
        <div class="envelope">
            <div class="top-flap"></div>
            <div class="wax-seal">D & M</div>
            <div class="letter">
                <h2>Dahiana & Manuel</h2>
                <p>03.10.2026</p>
                <small>Toca para abrir</small>
            </div>
            <div class="back"></div>
            <div class="front"></div>
        </div>
    </div>

    <div id="content">
        <div class="header-decor">
            <h1>Dahiana & Manuel</h1>
            
            <button class="btn-music" id="btnControlMusic" onclick="toggleMusic()">
                <span id="musicIcon">▶️</span> <span id="musicText">Reproducir</span>
            </button>
        </div>

        <div class="mensaje">
            <p>"Te elegí a ti porque eres la persona que me hace feliz, eres la persona que tengo en mi mente cada minuto."</p>
        </div>

        <div id="countdown"></div>

        <div class="botones">
            <a href="https://maps.app.goo.gl/TU-LINK-AQUI" class="btn-oliva" target="_blank">📍 Ver Ubicación</a>
            <a href="https://wa.me/TU-NUMERO" class="btn-oliva" target="_blank">📱 Confirmar Asistencia</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
