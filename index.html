<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda Dahiana & Manuel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <audio id="music">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="envelope-wrapper" id="envelope-wrapper">
        <div class="lilies-behind">
            <svg class="lily lily-1" viewBox="0 0 40 80">
                <path d="M20,0C10,10,0,25,20,50C40,25,30,10,20,0z" fill="white"/> <path d="M19,50v30h2v-30z" fill="#7A8450"/> </svg>
            <svg class="lily lily-2" viewBox="0 0 40 80">
                <path d="M20,0C10,10,0,25,20,50C40,25,30,10,20,0z" fill="white"/>
                <path d="M19,50v30h2v-30z" fill="#7A8450"/>
            </svg>
            <svg class="lily lily-3" viewBox="0 0 40 80">
                <path d="M20,0C10,10,0,25,20,50C40,25,30,10,20,0z" fill="white"/>
                <path d="M19,50v30h2v-30z" fill="#7A8450"/>
            </svg>
            <svg class="lily lily-4" viewBox="0 0 40 80">
                <path d="M20,0C10,10,0,25,20,50C40,25,30,10,20,0z" fill="white"/>
                <path d="M19,50v30h2v-30z" fill="#7A8450"/>
            </svg>
        </div>

        <div class="envelope">
            <div class="top-flap"></div>
            <div class="wax-seal">D & M</div>
            <div class="letter">
                <h2>
                    <svg class="rings-icon" viewBox="0 0 70 64" fill="none" stroke="currentColor" stroke-width="3.5">
                        <circle cx="28" cy="32" r="14" class="wedding-band"/>
                        <circle cx="42" cy="32" r="14" class="engagement-band"/>
                        <g class="diamond-setting" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="2.5">
                            <path d="M 42,6 l -4,6 l 4,4 l 4,-4 z" /> <path d="M 38,12 L 40,18 M 46,12 L 44,18" fill="none" stroke-linecap="round"/> </g>
                    </svg>
                    Dahiana & Manuel
                </h2>
                <p>03.10.2026</p>
                <small>Toca para abrir</small>
            </div>
            <div class="back"></div>
            <div class="front"></div>
        </div>
    </div>

    <div id="content">
        <div class="header-decor">
            <h1>
                <svg class="rings-icon rings-icon-main" viewBox="0 0 70 64" fill="none" stroke="currentColor" stroke-width="3.5">
                    <circle cx="28" cy="32" r="14" class="wedding-band"/>
                    <circle cx="42" cy="32" r="14" class="engagement-band"/>
                    <g class="diamond-setting" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="2.5">
                        <path d="M 42,6 l -4,6 l 4,4 l 4,-4 z" />
                        <path d="M 38,12 L 40,18 M 46,12 L 44,18" fill="none" stroke-linecap="round"/>
                    </g>
                </svg>
                Dahiana & Manuel
            </h1>
            <p class="subtitle">DALE PLAY PARA ESCUCHAR NUESTRA CANCIÓN</p>
            
            <button class="btn-music" id="btnControlMusic" onclick="toggleMusic()">
                <span id="musicIcon">▶️</span> <span id="musicText">Reproducir</span>
            </button>
        </div>

        <div class="mensaje">
            <p>"Nos encontramos, nos elegimos y hoy queremos compartir contigo nuestra felicidad."</p>
        </div>

        <div id="countdown"></div>

        <div class="botones">
            <a href="https://www.google.com/maps/place/Jardines+Cortijo+Triana/@38.0246558,-4.0561009,687m/data=!3m2!1e3!4b1!4m6!3m5!1s0xd6c364a7c61fbdb:0x937df16aa6a94629!8m2!3d38.0246558!4d-4.0561009!16s%2Fg%2F11yf_schx?entry=ttu&g_ep=EgoyMDI2MDMyOS4wIKXMDSoASAFQAw%3D%3D" class="btn-oliva" target="_blank">📍 Ver Ubicación</a>
            
            <a href="https://wa.me/34602732290?text=¡Hola!+Confirmo+mi+asistencia+a+la+boda." class="btn-oliva" target="_blank">📱 Confirmar con Dahiana</a>
            
            <a href="https://wa.me/34664593119?text=¡Hola!+Confirmo+mi+asistencia+a+la+boda." class="btn-oliva" target="_blank">📱 Confirmar con Manuel</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
