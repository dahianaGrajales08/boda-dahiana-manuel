<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda Dahiana & Manuel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="falling-flowers"></div>

    <audio id="music">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="envelope-wrapper" id="envelope-wrapper">
        
        <div class="lilies-container">
            <img src="https://www.pngplay.com/wp-content/uploads/12/White-Lily-Transparent-Background.png" class="lily lily-1" alt="Lirio">
            <img src="https://www.pngplay.com/wp-content/uploads/12/White-Lily-Transparent-Background.png" class="lily lily-2" alt="Lirio">
        </div>

        <div class="envelope">
            <div class="top-flap"></div>
            <div class="wax-seal">D & M</div>
            <div class="letter">
                <div class="letter-content">
                    <svg class="rings-icon" viewBox="0 0 100 60">
                        <circle cx="35" cy="35" r="20" class="ring-band" />
                        <circle cx="60" cy="35" r="20" class="ring-band" />
                        <path d="M 60,5 L 53,15 L 60,25 L 67,15 Z" class="diamond" />
                    </svg>
                    <h2 class="gold-text">Dahiana & Manuel</h2>
                    <p>03.10.2026</p>
                    <small>Toca para abrir</small>
                </div>
            </div>
            <div class="back"></div>
            <div class="front"></div>
        </div>
    </div>

    <div id="content">
        <div class="header-decor">
            <svg class="rings-icon main-rings" viewBox="0 0 100 60">
                <circle cx="35" cy="35" r="20" class="ring-band" />
                <circle cx="60" cy="35" r="20" class="ring-band" />
                <path d="M 60,5 L 53,15 L 60,25 L 67,15 Z" class="diamond" />
            </svg>
            <h1 class="gold-text">Dahiana & Manuel</h1>
            <p class="subtitle">DALE PLAY PARA ESCUCHAR NUESTRA CANCIÓN</p>
            
            <button class="btn-music" onclick="toggleMusic()">
                <span id="musicIcon">▶️</span> <span id="musicText">Reproducir</span>
            </button>
        </div>

        <div class="mensaje">
            <p>"Te elegí a ti porque eres la persona que me hace feliz, eres la persona que tengo en mi mente cada minuto."</p>
        </div>

        <div id="countdown"></div>

        <div class="botones">
            <a href="https://maps.google.com" class="btn-oliva" target="_blank">📍 Ver Ubicación</a>
            <a href="https://wa.me/34602732290" class="btn-oliva" target="_blank">📱 Confirmar con Dahiana</a>
            <a href="https://wa.me/34664593119" class="btn-oliva" target="_blank">📱 Confirmar con Manuel</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
