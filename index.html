<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda Dahiana & Manuel</title>
    <link rel="icon" href="boda.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-floral"> 
    <div id="falling-flowers"></div>

    <audio id="music" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="envelope-wrapper" id="envelope-wrapper">
        <div class="opener-image-container">
            <img src="lirios.png" alt="Lirios" class="lirios-img-clean">
        </div>

        <div class="envelope">
            <div class="top-flap"></div>
            <div class="wax-seal">D & M</div>
            <div class="letter">
                <div class="letter-content">
                    <img src="anillos.png" alt="Alianzas" class="rings-img-small">
                    <h2 class="gold-text">Dahiana & Manuel</h2>
                    <p class="date-text">03.10.2026</p>
                    <small class="tap-text">Toca para abrir</small>
                </div>
            </div>
            <div class="back"></div>
            <div class="front"></div>
        </div>
    </div>

    <div id="content">
        <div class="header-decor">
            <img src="anillos.png" alt="Alianzas" class="rings-img-main">
            <h1 class="header-names gold-text">Dahiana & Manuel</h1>
            <p class="subtitle">DALE PLAY PARA ESCUCHAR NUESTRA CANCIÓN</p>
            
            <div class="custom-player">
                <div class="player-controls">
                    <span class="player-icon small">⏮</span>
                    <button class="play-pause-btn" id="btnControlMusic" onclick="toggleMusic()">
                        <span id="musicIcon">▶</span>
                    </button>
                    <span class="player-icon small">⏭</span>
                </div>
                <div class="player-progress">
                    <div class="progress-bar"></div>
                    <div class="progress-dot"></div>
                </div>
            </div>
        </div>

        <div class="mensaje">
            <p>"Nos encontramos, nos elegimos y hoy queremos compartir contigo nuestra felicidad."</p>
        </div>

        <div id="countdown"></div>

        <div class="botones">
            <a href="https://maps.app.goo.gl/9yBAtR451fUayw8e6" class="btn-oliva" target="_blank">📍 Ver Ubicación</a>
            
            <a href="https://wa.me/34602732290?text=%C2%A1Hola!%20Confirmo%20mi%20asistencia%20a%20vuestra%20boda." class="btn-oliva" target="_blank">📱 Confirmar con Dahiana</a>
            <a href="https://wa.me/34664593119?text=%C2%A1Hola!%20Confirmo%20mi%20asistencia%20a%20vuestra%20boda." class="btn-oliva" target="_blank">📱 Confirmar con Manuel</a>
        </div>

        <div style="margin-top: 30px;">
            <button class="btn-volver" id="btnVolver">← Volver</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
