<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda Dahiana & Manuel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="falling-flowers"></div>

    <audio id="music">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="envelope-wrapper" id="envelope-wrapper">
        
        <div class="lilies-container">
            <img src="https://img.freepik.com/vector-premium/lirio-blanco-aislado-blanco-lirio-blanco-vector_654157-142.jpg" class="lily lily-left" alt="Lirio">
            <img src="https://img.freepik.com/vector-premium/lirio-blanco-aislado-blanco-lirio-blanco-vector_654157-142.jpg" class="lily lily-right" alt="Lirio">
        </div>

        <div class="envelope">
            <div class="top-flap"></div>
            <div class="wax-seal">D & M</div>
            <div class="letter">
                <div class="letter-content">
                    <div class="rings-wrapper">
                        <svg class="rings-svg" viewBox="0 0 100 60">
                            <circle cx="35" cy="35" r="20" class="ring-gold" />
                            <circle cx="60" cy="35" r="20" class="ring-gold" />
                            <path d="M 60,5 L 53,15 L 60,22 L 67,15 Z" fill="#e0f7fa" stroke="#b2ebf2" />
                        </svg>
                    </div>
                    <h2 class="names-gold">Dahiana & Manuel</h2>
                    <p>03.10.2026</p>
                    <small>Toca para abrir</small>
                </div>
            </div>
            <div class="back"></div>
            <div class="front"></div>
        </div>
    </div>

    <div id="content">
        <div class="header-decor">
            <div class="rings-wrapper large">
                <svg class="rings-svg" viewBox="0 0 100 60">
                    <circle cx="35" cy="35" r="20" class="ring-gold" />
                    <circle cx="60" cy="35" r="20" class="ring-gold" />
                    <path d="M 60,5 L 53,15 L 60,22 L 67,15 Z" fill="#e0f7fa" stroke="#b2ebf2" />
                </svg>
            </div>
            <h1 class="names-gold">Dahiana & Manuel</h1>
            <p class="subtitle">DALE PLAY PARA ESCUCHAR NUESTRA CANCIÓN</p>
            
            <button class="btn-music" onclick="toggleMusic()">
                <span id="musicIcon">▶️</span> <span id="musicText">Reproducir</span>
            </button>
        </div>

        <div class="mensaje">
            <p>"Te elegí a ti porque eres la persona que me hace feliz..."</p>
        </div>

        <div id="countdown"></div>

        <div class="botones">
            <a href="#" class="btn-oliva">📍 Ver Ubicación</a>
            <a href="#" class="btn-oliva">📱 Confirmar Asistencia</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
