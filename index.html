<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Boda Dahiana & Manuel</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- SOBRE -->
<div class="envelope" id="envelope">
  <div class="cover"></div>
  <div class="letter">
    <h2>Dahiana & Manuel</h2>
    <p>03 Octubre 2026</p>
    <p class="open">Abrir</p>
  </div>
</div>

<!-- CONTENIDO -->
<div class="content" id="content">

  <h1>Dahiana & Manuel</h1>

  <p class="mensaje">
  Con mucha ilusión queremos invitarte a uno de los días más importantes de nuestra vida...
  </p>

  <h2>Detalles</h2>
  <p>📅 03 de octubre 2026</p>
  <p>🕐 13:00</p>
  <p>📍 Cortijo Triana, Andújar (Jaén)</p>

  <!-- CONTADOR -->
  <div id="countdown"></div>

  <!-- GALERÍA -->
  <div class="galeria">
    <img src="https://picsum.photos/300/200">
    <img src="https://picsum.photos/301/200">
    <img src="https://picsum.photos/302/200">
  </div>

  <!-- MAPA -->
  <iframe src="https://www.google.com/maps?q=Cortijo+Triana+Andujar&output=embed"></iframe> 

  <!-- WHATSAPP -->
  <div class="botones">
    <a href="https://wa.me/34602732290">Confirmar con Dahiana</a>
    <a href="https://wa.me/34664593119">Confirmar con Manuel</a>
  </div>

  <!-- MÚSICA -->
  <button onclick="toggleMusic()">🎵 Música</button>
  <audio id="music" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

</div>

<script src="script.js"></script>
</body>
</html>
