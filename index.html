<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda Dahiana & Manuel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <audio id="music">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="envelope-wrapper" id="envelope-wrapper">
        <div class="envelope">
            <div class="top-flap"></div>
            <div class="wax-seal">D & M</div>
            <div class="letter">
                <h2>
                    <svg class="rings-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.5">
                        <circle cx="26" cy="32" r="14"/>
                        <circle cx="38" cy="32" r="14"/>
                    </svg>
                    Dahiana & Manuel
                </h2>
                <p>03.10.2026</p>
                <small>Toca para abrir</small>
            </div>
            <div class="back"></div>
            <div class="front"></div>
        </div>
    </div>

    <div id="content">
        <div class="header-decor">
            <h1>
                <svg class="rings-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.5">
                    <circle cx="26" cy="32" r="14"/>
                    <circle cx="38" cy="32" r="14"/>
                </svg>
                Dahiana & Manuel
            </h1>
            <p class="subtitle">DALE PLAY PARA ESCUCHAR NUESTRA CANCIÓN</p>
            
            <button class="btn-music" id="btnControlMusic" onclick="toggleMusic()">
                <span id="musicIcon">▶️</span> <span id="musicText">Reproducir</span>
            </button>
        </div>

        <div class="mensaje">
            <p>"Nos encontramos, nos elegimos y hoy queremos compartir contigo nuestra felicidad."</p>
        </div>

        <div id="countdown"></div>

        <div class="botones">

            <a href="https://wa.me/34602732290?text=¡Hola!+Confirmo+mi+asistencia+a+la+boda." class="btn-oliva" target="_blank">📱 Confirmar con Dahiana</a>
            <a href="https://wa.me/34664593119?text=¡Hola!+Confirmo+mi+asistencia+a+la+boda." class="btn-oliva" target="_blank">📱 Confirmar con Manuel</a>
        </div>
    </div>

    <script src="script.js"></script>
